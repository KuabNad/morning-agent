name: Morning Agent

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC.
    # 08:00 UTC = 09:00 Canary Islands time during summer time.
    # Change to "0 9 * * *" for 09:00 Canary Islands winter time.
    - cron: "0 8 * * *"

jobs:
  morning:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning agent
        env:
          LOCATION_NAME: ${{ secrets.LOCATION_NAME }}
          LATITUDE: ${{ secrets.LATITUDE }}
          LONGITUDE: ${{ secrets.LONGITUDE }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CANARY_RSS_FEEDS: ${{ secrets.CANARY_RSS_FEEDS }}
          SCIENCE_RSS_FEEDS: ${{ secrets.SCIENCE_RSS_FEEDS }}
          WORLD_RSS_FEEDS: ${{ secrets.WORLD_RSS_FEEDS }}
        run: python main.py
